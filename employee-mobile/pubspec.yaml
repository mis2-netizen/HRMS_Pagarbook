name: employee_mobile
description: Pagarbook-style HRMS Mobile App for Employee Attendance & Leaves.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.2.1
  geolocator: ^11.0.0
  camera: ^0.10.5+9
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  path_provider: ^2.1.3
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/splash.png

